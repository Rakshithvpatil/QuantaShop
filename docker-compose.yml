version: "3.9"

# SwiftPulse infrastructure — all free, all local
# Run: docker compose up -d

services:

  # ── Apache Kafka (event bus for orders + IoT) ─────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: swiftpulse-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: swiftpulse-kafka
    depends_on: [zookeeper]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  # ── Mosquitto MQTT broker (wearable / IoT telemetry) ─────────────────────
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: swiftpulse-mqtt
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./infra/mosquitto.conf:/mosquitto/config/mosquitto.conf

  # ── Prometheus (metrics scraping) ─────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: swiftpulse-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml

  # ── Grafana (free dashboards) ─────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.3
    container_name: swiftpulse-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: swiftpulse
    depends_on: [prometheus]

  # ── MLflow tracking server ─────────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    container_name: swiftpulse-mlflow
    ports:
      - "5000:5000"
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow.db --default-artifact-root /mlflow/artifacts
    volumes:
      - mlflow_data:/mlflow

volumes:
  mlflow_data:

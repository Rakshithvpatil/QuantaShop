name: SwiftPulse CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch==2.3.0 --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt

      - name: Lint
        run: |
          pip install ruff
          ruff check . --ignore E501

      - name: Unit tests
        run: pytest tests/ -v --tb=short

      - name: Data pipeline smoke test
        run: |
          python ingestion/seed_data.py
          python ingestion/build_features.py
          python -c "
          import duckdb
          con = duckdb.connect('./data/swiftpulse.duckdb', read_only=True)
          n = con.execute('SELECT COUNT(*) FROM order_features').fetchone()[0]
          assert n > 0, 'Feature table empty!'
          print(f'Pipeline OK — {n} feature rows')
          "
